name: Keepalive Workflow
on:
  schedule:
    - cron: "0 0 * * 0"  # Every Sunday at midnight UTC
permissions:
  actions: write
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 45
